<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown to Presentation Converter</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Highlight.js for Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-ocean.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/markdown/markdown.min.js"></script>

    <!-- Export Libraries -->
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f111a; 
        }

        /* Editor Overrides - Fixed Overlap & Gutter Spacing */
        .CodeMirror {
            height: 100% !important;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            background: #0f111a !important;
        }
        .CodeMirror-gutters {
            background: #0f111a !important;
            border-right: 1px solid #1f2233 !important;
            width: 45px !important; 
        }
        .CodeMirror-linenumber {
            color: #4b526d !important;
            padding-right: 10px !important;
            min-width: 30px !important;
            text-align: right !important;
        }
        .CodeMirror-lines {
            padding-left: 8px !important; 
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track { background: #0f111a; }
        ::-webkit-scrollbar-thumb { background: #2a2e42; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b405a; }

        /* Slide Preview Canvas Pattern */
        .preview-canvas {
            background-color: #1a1d27;
            background-image: radial-gradient(#2a2e42 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Slide Container & Typography using Container Queries */
        .slide-wrapper {
            container-type: inline-size;
            aspect-ratio: 16 / 9;
            width: 100%;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease;
            position: relative;
        }

        .slide-content {
            font-size: 2.2cqw;
            color: #1a1a1a;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* THEME STYLES */
        .theme-default .slide-wrapper { background: white; color: #1a1a1a; }
        .theme-default .slide-content h1 { color: #000; }
        
        .theme-dark .slide-wrapper { background: #1a1a1a; color: #e5e7eb; }
        .theme-dark .slide-content h1 { color: #fff; }
        .theme-dark .slide-content h2 { color: #9ca3af; }
        .theme-dark .slide-content p, .theme-dark .slide-content li { color: #d1d5db; }
        .theme-dark .slide-content table th { background-color: #262626; color: white; }
        .theme-dark .slide-content table td { border-color: #404040; color: #d1d5db; }

        .theme-midnight .slide-wrapper { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #f8fafc; }
        .theme-midnight .slide-content h1 { color: #38bdf8; }
        .theme-midnight .slide-content h2 { color: #7dd3fc; }
        .theme-midnight .slide-content blockquote { border-color: #38bdf8; color: #94a3b8; }

        .theme-sepia .slide-wrapper { background: #f4ecd8; color: #433422; }
        .theme-sepia .slide-content { font-family: 'Playfair Display', serif; }
        .theme-sepia .slide-content h1 { color: #5d4037; }
        .theme-sepia .slide-content blockquote { border-color: #d7ccc8; }

        .slide-content h1 { font-size: 4.5cqw; font-weight: 800; margin-bottom: 2cqw; line-height: 1.1; letter-spacing: -0.03em; }
        .slide-content h2 { font-size: 3cqw; font-weight: 500; margin-bottom: 2cqw; line-height: 1.2; color: inherit; opacity: 0.8; }
        .slide-content h3 { font-size: 2.5cqw; font-weight: 600; margin-bottom: 1.5cqw; }
        .slide-content p { margin-bottom: 1.5cqw; line-height: 1.5; }
        .slide-content ul { margin-left: 3cqw; margin-bottom: 1.5cqw; list-style-type: disc; }
        .slide-content li { margin-bottom: 0.8cqw; line-height: 1.4; }
        .slide-content strong { font-weight: 700; }
        .slide-content em { font-style: italic; }
        .slide-content blockquote { border-left: 0.5cqw solid #e5e7eb; padding-left: 2cqw; font-style: italic; opacity: 0.7; }
        .slide-content code:not(.hljs) { background: rgba(0,0,0,0.05); padding: 0.2cqw 0.6cqw; border-radius: 0.4cqw; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }
        .slide-content pre { border-radius: 1cqw; overflow-x: auto; margin-bottom: 1.5cqw; background: #282c34; }
        .slide-content pre code { padding: 2cqw; font-size: 1.8cqw; display: block; border-radius: 1cqw; }
        
        .slide-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2cqw;
            font-size: 1.8cqw;
        }
        .slide-content th, .slide-content td {
            border: 0.1cqw solid #e5e7eb;
            padding: 1cqw 1.5cqw;
            text-align: left !important;
        }
        .slide-content th {
            background-color: #f9fafb;
            font-weight: 700;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            border-radius: 1cqw;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            background: rgba(0,0,0,0.05);
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            z-index: 2;
        }
        .iframe-fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2cqw;
            text-align: center;
            background: #f3f4f6;
            color: #4b5563;
            font-size: 1.5cqw;
            z-index: 1;
        }

        .slide-layout-center {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 8cqw;
            height: 100%;
            width: 100%;
        }
        
        .slide-layout-split {
            display: flex;
            height: 100%;
            width: 100%;
        }
        
        .slide-layout-split-text {
            flex: 1;
            padding: 8cqw 4cqw 8cqw 8cqw;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .slide-layout-split-image {
            flex: 1;
            padding: 4cqw;
            display: flex;
            flex-direction: row; 
            flex-wrap: wrap; 
            gap: 2cqw;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.03);
            min-width: 0;
            overflow: hidden;
        }

        .slide-layout-split-image img, 
        .slide-layout-center img {
            max-height: 100%;
            max-width: 100%;
            flex-shrink: 1; 
            min-width: 0; 
            object-fit: contain !important; 
            border-radius: 0.8cqw;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .slide-layout-split-image img {
            flex: 1 1 40%; 
        }

        .image-grid-2x1 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2cqw;
            width: 100%;
            height: 100%;
            padding: 4cqw;
        }

        .image-grid-2x2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 2cqw;
            width: 100%;
            height: 100%;
            padding: 4cqw;
        }

        #presentation-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #presentation-overlay.active { display: flex; }

        #presentation-slide-container {
            width: 100vw;
            height: 100vh;
            padding: 4vmin;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        #presentation-slide-container .slide-wrapper {
            width: 100%;
            max-width: calc((100vh - 8vmin) * 16 / 9);
            aspect-ratio: 16 / 9;
            margin: 0 auto;
        }

        .slide-counter {
            position: absolute;
            bottom: 2cqw;
            right: 3cqw;
            color: gray;
            opacity: 0.6;
            font-size: 1.5cqw;
            font-weight: 500;
        }

        #nav-hint {
            opacity: 1;
            transition: opacity 0.5s ease-out;
        }
        #nav-hint.hidden { opacity: 0; pointer-events: none; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 50;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #1a1d27;
            border: 1px solid #3b405a;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .theme-card {
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .theme-card.active {
            border-color: #3b82f6;
            background: #2a2e42;
        }

        @media print {
            @page { size: landscape; margin: 0; }
            body, html { background: white !important; height: auto !important; overflow: visible !important; }
            header, main > div:first-child, #presentation-overlay, #nav-hint, .modal-overlay, #manual-save-btn, .slide-counter { display: none !important; }
            main { display: block !important; overflow: visible !important; }
            .preview-canvas { background: white !important; overflow: visible !important; position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; padding: 0 !important; }
            #preview-container { display: block !important; padding: 0 !important; margin: 0 !important; max-width: none !important; }
            .slide-wrapper { page-break-after: always !important; break-after: page !important; width: 100vw !important; height: 100vh !important; border-radius: 0 !important; box-shadow: none !important; margin: 0 !important; display: block !important; visibility: visible !important; }
            .slide-content { font-size: 2.2vw !important; }
            .slide-content h1 { font-size: 4.5vw !important; }
            .slide-content h2 { font-size: 3vw !important; }
            .slide-content h3 { font-size: 2.5vw !important; }
        }
    </style>
</head>
<body class="h-screen flex flex-col text-white overflow-hidden theme-default" id="app-body">

    <!-- Header -->
    <header class="h-14 border-b border-[#1f2233] bg-[#0f111a] flex items-center justify-between px-6 shrink-0 z-10 shadow-sm">
        <div class="flex items-center gap-3">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            <h1 class="font-semibold text-gray-200 tracking-wide text-sm">MD Presentation</h1>
        </div>
        <div class="flex items-center gap-2 text-sm">
            <button onclick="toggleThemeModal()" class="px-3 py-1.5 rounded-md bg-[#1f2233] hover:bg-[#2a2e42] text-gray-300 font-medium transition-colors flex items-center gap-2 border border-[#3b405a]">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
                Themes
            </button>
            <button onclick="toggleImageModal()" class="px-3 py-1.5 rounded-md bg-[#1f2233] hover:bg-[#2a2e42] text-gray-300 font-medium transition-colors flex items-center gap-2 border border-[#3b405a]">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                Images
            </button>
            <div class="h-6 w-[1px] bg-[#1f2233] mx-1"></div>
            <button id="manual-save-btn" onclick="saveToLocal(true)" class="px-3 py-1.5 rounded-md bg-[#1f2233] hover:bg-[#2a2e42] text-gray-300 font-medium transition-colors flex items-center gap-2 border border-[#3b405a]">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save
            </button>
            <div class="h-6 w-[1px] bg-[#1f2233] mx-1"></div>
            <button onclick="exportToPPTX()" class="px-3 py-1.5 rounded-md bg-[#1f2233] hover:bg-[#2a2e42] text-gray-300 font-medium transition-colors flex items-center gap-2 border border-[#3b405a]">
                PPTX
            </button>
            <button onclick="exportToPDF()" class="px-3 py-1.5 rounded-md bg-gray-600 hover:bg-gray-500 text-white font-medium transition-colors flex items-center gap-2 shadow-lg">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                PDF
            </button>
            <button onclick="present()" class="ml-2 px-4 py-1.5 rounded-md bg-blue-600 hover:bg-blue-500 text-white font-medium transition-colors flex items-center gap-2 shadow-lg shadow-blue-900/20">
                Present 
                <span class="text-blue-200 text-xs bg-blue-700/50 px-1.5 py-0.5 rounded border border-blue-500/30">Ctrl+Enter</span>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        <div class="w-1/2 h-full border-r border-[#1f2233] flex flex-col relative shadow-[10px_0_15px_-3px_rgba(0,0,0,0.1)] z-10">
            <textarea id="editor"></textarea>
        </div>
        <div id="canvas-area" class="w-1/2 h-full preview-canvas overflow-y-auto relative">
            <div id="preview-container" class="p-8 pb-24 max-w-4xl mx-auto flex flex-col gap-10"></div>
        </div>
    </main>

    <!-- Fullscreen Presentation Overlay -->
    <div id="presentation-overlay" onclick="handleOverlayClick(event)">
        <div id="presentation-slide-container"></div>
        <div id="nav-hint" class="absolute bottom-12 left-0 right-0 flex justify-center gap-4 text-gray-500 text-[10px] uppercase tracking-widest pointer-events-none">
            Click, Space, or Arrow keys to navigate • Esc to exit
        </div>
        <button onclick="openPresenterView(event)" class="absolute bottom-0 left-0 px-3 py-2 bg-transparent text-gray-600 hover:text-gray-300 text-[10px] transition-all z-[10000]">
            Presenter View
        </button>
    </div>

    <!-- Image Modal -->
    <div id="image-modal" class="modal-overlay" onclick="if(event.target === this) toggleImageModal()">
        <div class="modal-content">
            <div class="p-4 border-b border-[#3b405a] flex items-center justify-between">
                <h3 class="font-semibold">Image Library</h3>
                <button onclick="toggleImageModal()" class="text-gray-400 hover:text-white">&times;</button>
            </div>
            <div class="p-6 overflow-y-auto flex-1">
                <div class="mb-6">
                    <label class="block w-full cursor-pointer bg-[#2a2e42] border-2 border-dashed border-[#3b405a] hover:border-blue-500 rounded-lg p-8 text-center transition-colors">
                        <input type="file" class="hidden" accept="image/*" onchange="handleFileUpload(this)">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-2 text-gray-400"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        <span class="text-sm font-medium text-gray-300">Click to upload or drag image here</span>
                        <p class="text-xs text-gray-500 mt-1">Supports PNG, JPG, WebP</p>
                    </label>
                </div>
                <div id="image-grid" class="grid grid-cols-2 gap-4"></div>
            </div>
            <div class="p-4 border-t border-[#3b405a] text-right">
                <button onclick="toggleImageModal()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-md text-sm font-medium">Done</button>
            </div>
        </div>
    </div>

    <!-- Theme Modal -->
    <div id="theme-modal" class="modal-overlay" onclick="if(event.target === this) toggleThemeModal()">
        <div class="modal-content">
            <div class="p-4 border-b border-[#3b405a] flex items-center justify-between">
                <h3 class="font-semibold">Theme Library</h3>
                <button onclick="toggleThemeModal()" class="text-gray-400 hover:text-white">&times;</button>
            </div>
            <div class="p-6 grid grid-cols-2 gap-4 overflow-y-auto flex-1">
                <div onclick="setTheme('theme-default')" class="theme-card p-4 rounded-lg bg-white border-gray-200 text-gray-900" id="card-theme-default">
                    <div class="h-2 w-8 bg-blue-500 rounded mb-2"></div>
                    <div class="font-bold text-sm">Modern Light</div>
                    <div class="text-[10px] opacity-60">Clean and professional</div>
                </div>
                <div onclick="setTheme('theme-dark')" class="theme-card p-4 rounded-lg bg-zinc-900 border-zinc-700 text-zinc-100" id="card-theme-dark">
                    <div class="h-2 w-8 bg-zinc-400 rounded mb-2"></div>
                    <div class="font-bold text-sm">Dark Professional</div>
                    <div class="text-[10px] opacity-60">High contrast for code</div>
                </div>
                <div onclick="setTheme('theme-midnight')" class="theme-card p-4 rounded-lg bg-slate-900 border-slate-700 text-slate-100" id="card-theme-midnight">
                    <div class="h-2 w-8 bg-sky-400 rounded mb-2"></div>
                    <div class="font-bold text-sm">Midnight Blue</div>
                    <div class="text-[10px] opacity-60">Elegant gradients</div>
                </div>
                <div onclick="setTheme('theme-sepia')" class="theme-card p-4 rounded-lg bg-[#f4ecd8] border-[#d7ccc8] text-[#433422]" id="card-theme-sepia">
                    <div class="h-2 w-8 bg-[#5d4037] rounded mb-2"></div>
                    <div class="font-bold text-sm" style="font-family: serif;">Sepia Serif</div>
                    <div class="text-[10px] opacity-60">Academic and classic</div>
                </div>
            </div>
            <div class="p-4 border-t border-[#3b405a] text-right">
                <button onclick="toggleThemeModal()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-md text-sm font-medium">Apply</button>
            </div>
        </div>
    </div>

    <script>
        let userImages = JSON.parse(localStorage.getItem('presentation_images')) || {};
        let currentTheme = localStorage.getItem('presentation_theme') || 'theme-default';
        let presenterWindow = null;

        const initialMarkdown = localStorage.getItem('markdown_presentation_content') || `# Welcome to MD Presentation
## This slide has speaker notes
?? Only you can see this message in Presenter View!
?? Remember to explain the ?? syntax.

---

# Layout Support
## Images & Video stay in sync
![Img1](https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500)

?? Slide 2 notes: Mention that layouts are automatic.

---

# Presenter Mode
- Open separate window
- See current/next slide
- Read your script

?? Good luck with your speech!`;

        const editorElement = document.getElementById("editor");
        editorElement.value = initialMarkdown;
        
        const editor = CodeMirror.fromTextArea(editorElement, {
            mode: "markdown",
            theme: "material-ocean",
            lineNumbers: true,
            lineWrapping: true,
            viewportMargin: Infinity
        });

        const previewContainer = document.getElementById('preview-container');
        const overlay = document.getElementById('presentation-overlay');
        const overlayContainer = document.getElementById('presentation-slide-container');
        const navHint = document.getElementById('nav-hint');
        const imageGrid = document.getElementById('image-grid');
        
        let currentSlideIndex = 0;
        let slideElements = [];
        let speakerNotes = [];

        function setTheme(themeId) {
            const body = document.getElementById('app-body');
            body.classList.remove('theme-default', 'theme-dark', 'theme-midnight', 'theme-sepia');
            body.classList.add(themeId);
            currentTheme = themeId;
            localStorage.setItem('presentation_theme', themeId);
            
            document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
            const activeCard = document.getElementById(`card-${themeId}`);
            if (activeCard) activeCard.classList.add('active');
            
            renderSlides();
            syncPresenter();
        }

        function toggleThemeModal() {
            const modal = document.getElementById('theme-modal');
            modal.classList.toggle('active');
            if (modal.classList.contains('active')) {
                document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
                const activeCard = document.getElementById(`card-${currentTheme}`);
                if (activeCard) activeCard.classList.add('active');
            }
        }

        function sanitizeIframe(iframe) {
            let src = iframe.getAttribute('src');
            if (!src) return;

            if (src.startsWith('http://')) {
                src = src.replace('http://', 'https://');
                iframe.setAttribute('src', src);
            }

            if (src.includes('youtube.com/embed')) {
                const url = new URL(src);
                url.searchParams.set('origin', window.location.origin);
                url.searchParams.set('enablejsapi', '1');
                iframe.setAttribute('src', url.toString());
            }
            iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
        }

        function toggleImageModal() {
            const modal = document.getElementById('image-modal');
            modal.classList.toggle('active');
            if (modal.classList.contains('active')) renderImageGrid();
        }

        function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const id = `img_${Object.keys(userImages).length + 1}.${file.name.split('.').pop()}`;
                userImages[id] = e.target.result;
                renderImageGrid();
                renderSlides(); 
            };
            reader.readAsDataURL(file);
            input.value = ''; 
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = `![Alt Text](${text})`;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-blue-600 text-white px-4 py-2 rounded shadow-lg text-sm z-[100]';
            toast.innerText = 'Copied Markdown syntax!';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function deleteImage(id) {
            delete userImages[id];
            renderImageGrid();
            renderSlides();
        }

        function renderImageGrid() {
            imageGrid.innerHTML = '';
            Object.entries(userImages).forEach(([id, data]) => {
                const div = document.createElement('div');
                div.className = 'bg-[#0f111a] p-3 rounded border border-[#3b405a] group relative';
                div.innerHTML = `
                    <img src="${data}" class="w-full h-24 object-cover rounded mb-2 border border-[#3b405a]">
                    <div class="flex flex-col gap-1">
                        <code class="text-[10px] text-gray-400 bg-black/30 px-1 py-0.5 rounded truncate">${id}</code>
                        <div class="flex gap-2">
                            <button onclick="copyToClipboard('${id}')" class="flex-1 text-[10px] bg-blue-600/20 text-blue-400 hover:bg-blue-600/40 py-1 rounded transition-colors">Copy Link</button>
                            <button onclick="deleteImage('${id}')" class="text-[10px] bg-red-600/20 text-red-400 hover:bg-red-600/40 px-2 rounded transition-colors">&times;</button>
                        </div>
                    </div>
                `;
                imageGrid.appendChild(div);
            });
        }

        function resolveImageSrc(src) {
            return userImages[src] || src;
        }

        function autoFitSlide(wrapper) {
            const content = wrapper.querySelector('.slide-content');
            if (!content) return;
            requestAnimationFrame(() => {
                let fontSize = 2.2;
                const minFontSize = 0.8;
                const step = 0.1;
                content.style.fontSize = fontSize + 'cqw';
                while (content.scrollHeight > content.offsetHeight && fontSize > minFontSize) {
                    fontSize -= step;
                    content.style.fontSize = fontSize + 'cqw';
                }
            });
        }

        function extractSpeakerNotes(markdown) {
            const notes = [];
            const lines = markdown.split('\n');
            const filteredLines = lines.filter(line => {
                const isNote = line.trim().startsWith('??');
                if (isNote) notes.push(line.trim().substring(2).trim());
                return !isNote;
            });
            return {
                cleanMarkdown: filteredLines.join('\n'),
                notes: notes.join('\n')
            };
        }

        function createSlideElement(slideMd, index, total) {
            const { cleanMarkdown, notes } = extractSpeakerNotes(slideMd);
            speakerNotes[index] = notes;

            const trimmedMd = cleanMarkdown.trim();
            if (!trimmedMd) return null;
            const sanitizedMd = trimmedMd.replace(/([^\n])\n(!\[.*\]\(.*\))/g, '$1\n\n$2');
            const slideHtml = marked.parse(sanitizedMd);
            const slideWrapper = document.createElement('div');
            slideWrapper.className = 'slide-wrapper';
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = slideHtml;
            const images = [];
            const iframes = [];
            const textNodes = [];

            Array.from(tempDiv.childNodes).forEach(node => {
                if (node.nodeName === 'P') {
                    const imgsInP = node.querySelectorAll('img');
                    const iframesInP = node.querySelectorAll('iframe');
                    if (imgsInP.length > 0) imgsInP.forEach(i => images.push(i));
                    if (iframesInP.length > 0) iframesInP.forEach(i => iframes.push(i));
                    let clonedNode = node.cloneNode(true);
                    clonedNode.querySelectorAll('img, iframe').forEach(el => el.remove());
                    if (clonedNode.textContent.trim().length > 0) textNodes.push(clonedNode);
                } else if (node.nodeName === 'IFRAME') {
                    iframes.push(node);
                } else if (node.nodeName === 'IMG') {
                    images.push(node);
                } else if (node.nodeType === 1 || (node.nodeType === 3 && node.textContent.trim().length > 0)) {
                    textNodes.push(node);
                }
            });

            const contentDiv = document.createElement('div');
            contentDiv.className = 'slide-content';
            const hasText = textNodes.length > 0;
            const imgCount = images.length;
            const hasMedia = imgCount > 0 || iframes.length > 0;

            if (imgCount === 4) {
                const grid = document.createElement('div');
                grid.className = 'image-grid-2x2';
                images.forEach(img => {
                    img.src = resolveImageSrc(img.getAttribute('src'));
                    img.className = 'w-full h-full object-cover rounded-lg shadow-lg';
                    grid.appendChild(img);
                });
                if (hasText) {
                    contentDiv.innerHTML = `<div class="slide-layout-split"><div class="slide-layout-split-text"></div><div class="slide-layout-split-image" style="flex: 1.5;"></div></div>`;
                    textNodes.forEach(n => contentDiv.querySelector('.slide-layout-split-text').appendChild(n.cloneNode(true)));
                    contentDiv.querySelector('.slide-layout-split-image').appendChild(grid);
                } else {
                    contentDiv.appendChild(grid);
                }
            } else if (imgCount === 2 && !hasText && iframes.length === 0) {
                const grid = document.createElement('div');
                grid.className = 'image-grid-2x1';
                images.forEach(img => {
                    img.src = resolveImageSrc(img.getAttribute('src'));
                    img.className = 'w-full h-full object-cover rounded-lg shadow-lg';
                    grid.appendChild(img);
                });
                contentDiv.appendChild(grid);
            } else if (hasMedia && hasText) {
                contentDiv.innerHTML = `<div class="slide-layout-split"><div class="slide-layout-split-text"></div><div class="slide-layout-split-image"></div></div>`;
                const textCol = contentDiv.querySelector('.slide-layout-split-text');
                const mediaCol = contentDiv.querySelector('.slide-layout-split-image');
                textNodes.forEach(n => textCol.appendChild(n.cloneNode(true)));
                images.forEach(img => {
                    img.src = resolveImageSrc(img.getAttribute('src'));
                    img.className = 'max-w-full object-contain rounded-lg shadow-xl';
                    mediaCol.appendChild(img);
                });
                iframes.forEach(iframe => {
                    const w = iframe.getAttribute('width');
                    const h = iframe.getAttribute('height');
                    const isSmallWidget = w && parseInt(w) < 500;
                    
                    const wrap = document.createElement('div');
                    wrap.className = isSmallWidget ? 'relative mx-auto flex justify-center mb-2' : 'video-container mb-2';
                    sanitizeIframe(iframe);
                    
                    if (isSmallWidget) {
                        iframe.style.position = 'static';
                        iframe.style.display = 'block';
                        iframe.style.width = w + 'px';
                        iframe.style.height = h + 'px';
                        iframe.style.borderRadius = '0.5cqw';
                        wrap.appendChild(iframe);
                    } else {
                        wrap.innerHTML = `
                            <div class="iframe-fallback">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mb-2 opacity-50"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                                <p class="font-medium">External site could not be embedded.</p>
                                <p class="text-[10px] mt-1 opacity-70">The site likely prevents cross-origin embedding for security.</p>
                            </div>
                        `;
                        wrap.appendChild(iframe);
                    }
                    mediaCol.appendChild(wrap);
                });
            } else {
                const center = document.createElement('div');
                center.className = 'slide-layout-center';
                if (hasMedia) {
                    images.forEach(img => {
                        img.src = resolveImageSrc(img.getAttribute('src'));
                        img.className = 'max-h-[70cqh] object-contain rounded-lg shadow-xl mx-auto block mb-4';
                        center.appendChild(img);
                    });
                    iframes.forEach(iframe => {
                        const w = iframe.getAttribute('width');
                        const h = iframe.getAttribute('height');
                        const isSmallWidget = w && parseInt(w) < 500;
                        const wrap = document.createElement('div');
                        wrap.className = isSmallWidget ? 'relative mx-auto flex justify-center mb-4' : 'video-container max-w-4xl mx-auto mb-4';
                        sanitizeIframe(iframe);
                        if (isSmallWidget) {
                            iframe.style.position = 'static';
                            iframe.style.width = w + 'px';
                            iframe.style.height = h + 'px';
                            wrap.appendChild(iframe);
                        } else {
                            wrap.innerHTML = `
                                <div class="iframe-fallback">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mb-2 opacity-50"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                                    <p class="font-medium">External site could not be embedded.</p>
                                    <p class="text-[10px] mt-1 opacity-70">The site likely prevents cross-origin embedding for security.</p>
                                </div>
                            `;
                            wrap.appendChild(iframe);
                        }
                        center.appendChild(wrap);
                    });
                }
                textNodes.forEach(n => center.appendChild(n.cloneNode(true)));
                contentDiv.appendChild(center);
            }

            contentDiv.insertAdjacentHTML('beforeend', `<div class="slide-counter">${index + 1} / ${total}</div>`);
            slideWrapper.appendChild(contentDiv);
            slideWrapper.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
            autoFitSlide(slideWrapper);
            return slideWrapper;
        }

        function renderSlides() {
            const markdown = editor.getValue();
            const rawSlides = markdown.split(/^-{3,}\s*$/gm);
            previewContainer.innerHTML = '';
            slideElements = [];
            speakerNotes = [];
            rawSlides.forEach((slideMd, index) => {
                const el = createSlideElement(slideMd, index, rawSlides.length);
                if (el) {
                    slideElements.push(el.cloneNode(true));
                    previewContainer.appendChild(el);
                }
            });
            syncPresenter();
        }

        function saveToLocal(showFeedback = false) {
            localStorage.setItem('markdown_presentation_content', editor.getValue());
            localStorage.setItem('presentation_images', JSON.stringify(userImages));
            localStorage.setItem('presentation_theme', currentTheme);
            if (showFeedback) {
                const btn = document.getElementById('manual-save-btn');
                const orig = btn.innerHTML;
                btn.innerHTML = '<span class="text-green-400">Saved!</span>';
                setTimeout(() => btn.innerHTML = orig, 2000);
            }
        }

        setInterval(() => saveToLocal(false), 60000);

        function exportToPDF() { renderSlides(); window.print(); }

        async function exportToPPTX() {
            const pptx = new PptxGenJS();
            pptx.defineLayout({ name: 'WIDE', width: 13.33, height: 7.5 });
            pptx.layout = 'WIDE';
            const rawSlides = editor.getValue().split(/^-{3,}\s*$/gm);
            rawSlides.forEach((slideMd, idx) => {
                const { cleanMarkdown, notes } = extractSpeakerNotes(slideMd);
                const slide = pptx.addSlide();
                if (notes) slide.addNotes(notes);

                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = marked.parse(cleanMarkdown.trim());
                const h1 = tempDiv.querySelector('h1');
                const img = tempDiv.querySelector('img');
                const listItems = Array.from(tempDiv.querySelectorAll('li')).map(li => li.innerText);
                if (h1) slide.addText(h1.innerText, { x: 0.5, y: 0.6, w: 12, fontSize: 36, bold: true, color: '000000' });
                if (img) slide.addImage({ data: resolveImageSrc(img.getAttribute('src')), x: 7, y: 1.5, w: 5, h: 4, sizing: { type: 'contain', w: 5, h: 4 } });
                if (listItems.length > 0) slide.addText(listItems.map(t => ({ text: t, options: { bullet: true } })), { x: 0.5, y: 1.8, w: 6, fontSize: 18 });
            });
            pptx.writeFile({ fileName: `Presentation.pptx` });
        }

        editor.on("change", () => {
            clearTimeout(window.renderTimeout);
            window.renderTimeout = setTimeout(renderSlides, 150);
        });

        function present() {
            if (slideElements.length === 0) return;
            currentSlideIndex = 0;
            updatePresentation();
            overlay.classList.add('active');
            
            navHint.classList.remove('hidden');
            clearTimeout(window.hintTimeout);
            window.hintTimeout = setTimeout(() => {
                navHint.classList.add('hidden');
            }, 1500);
        }

        function updatePresentation() {
            overlayContainer.innerHTML = '';
            const wrapper = slideElements[currentSlideIndex].cloneNode(true);
            overlayContainer.appendChild(wrapper);
            autoFitSlide(wrapper);
            syncPresenter();
        }

        function openPresenterView(e) {
            if (e) e.stopPropagation();
            if (presenterWindow && !presenterWindow.closed) {
                presenterWindow.focus();
                return;
            }
            
            presenterWindow = window.open('about:blank', 'PresenterView', 'width=1100,height=700');
            
            const html = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Presenter View</title>
                    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <style>
                        body { background: #0f111a; color: #e5e7eb; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; padding: 24px; gap: 24px; box-sizing: border-box; }
                        .preview-box { background: #1a1d27; border: 1px solid #3b405a; border-radius: 8px; overflow: hidden; position: relative; width: 100%; aspect-ratio: 16/9; }
                        .slide-wrapper { position: absolute; top: 0; left: 0; transform-origin: top left; width: 1000px !important; border-radius: 0 !important; box-shadow: none !important; pointer-events: none; }
                        .notes-area { background: #1a1d27; border: 1px solid #3b405a; border-radius: 8px; padding: 24px; font-size: 1.5rem; line-height: 1.6; overflow-y: auto; flex: 1; }
                        .label { color: #94a3b8; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.05em; }
                        .nav-btn { background: #1f2233; border: 1px solid #3b405a; padding: 12px 24px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; transition: all 0.2s; color: #e5e7eb; cursor: pointer; }
                        .nav-btn:hover { background: #2a2e42; border-color: #4b526d; }
                        .nav-btn:active { transform: scale(0.98); }
                    </style>
                </head>
                <body id="presenter-body">
                    <div class="flex gap-8 h-2/3 flex-1 min-h-0">
                        <div class="w-1/2 flex flex-col min-h-0">
                            <span class="label">Speaker Notes</span>
                            <div id="notes" class="notes-area"></div>
                        </div>
                        <div class="w-1/2 flex flex-col gap-6 min-h-0">
                            <div class="flex-1 flex flex-col min-h-0">
                                <span class="label">Current Slide</span>
                                <div id="current-slide" class="preview-box"></div>
                            </div>
                            <div class="flex-1 flex flex-col min-h-0">
                                <span class="label">Next Slide</span>
                                <div id="next-slide" class="preview-box"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center bg-[#1a1d27] border border-[#3b405a] p-5 rounded-xl shadow-2xl shrink-0">
                        <div class="flex items-center gap-8">
                            <div id="timer" class="text-3xl font-bold font-mono text-blue-400 leading-none">00:00:00</div>
                            <div id="counter" class="text-xl font-medium text-gray-400 border-l border-gray-700 pl-8 leading-none">Slide 1 / 1</div>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="window.opener.prevSlide()" class="nav-btn flex items-center gap-2">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                                Previous
                            </button>
                            <button onclick="window.opener.nextSlide()" class="nav-btn bg-blue-600 border-blue-500 hover:bg-blue-500 text-white flex items-center gap-2">
                                Next
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            </button>
                        </div>
                    </div>
                    <script>
                        let startTime = Date.now();
                        setInterval(() => {
                            let diff = Math.floor((Date.now() - startTime) / 1000);
                            let h = String(Math.floor(diff / 3600)).padStart(2, '0');
                            let m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
                            let s = String(diff % 60).padStart(2, '0');
                            const t = document.getElementById('timer');
                            if (t) t.innerText = h + ':' + m + ':' + s;
                        }, 1000);
                        
                        window.onkeydown = (e) => {
                            if (['ArrowRight', ' ', 'Enter'].includes(e.key)) window.opener.nextSlide();
                            if (['ArrowLeft', 'Backspace'].includes(e.key)) window.opener.prevSlide();
                            if (e.key === 'Escape') window.opener.exitPresent();
                        };
                        
                        window.addEventListener('resize', () => { window.opener.syncPresenter(); });
                    <\/script>
                </body>
                </html>
            `;

            // Clear any existing content and append new HTML
            presenterWindow.document.open();
            presenterWindow.document.write(html);
            presenterWindow.document.close();
            
            // Re-inject main app styles into presenter window
            const style = presenterWindow.document.createElement('style');
            style.innerHTML = document.querySelector('style').innerHTML;
            presenterWindow.document.head.appendChild(style);

            // Give the window a moment to parse before initial sync
            setTimeout(() => {
                syncPresenter();
            }, 500);
        }

        function syncPresenter() {
            if (!presenterWindow || presenterWindow.closed) return;
            const doc = presenterWindow.document;
            const body = doc.getElementById('presenter-body');
            if (!body) return;

            body.className = `p-6 gap-6 flex flex-col min-h-0 ${currentTheme}`;
            const currentBox = doc.getElementById('current-slide');
            const nextBox = doc.getElementById('next-slide');
            const notesBox = doc.getElementById('notes');
            const counterBox = doc.getElementById('counter');
            
            if (!currentBox || !nextBox || !notesBox || !counterBox) return;

            currentBox.innerHTML = '';
            if (slideElements[currentSlideIndex]) {
                const currentWrap = slideElements[currentSlideIndex].cloneNode(true);
                currentWrap.className = 'slide-wrapper';
                currentBox.appendChild(currentWrap);
            }
            
            nextBox.innerHTML = '';
            if (currentSlideIndex < slideElements.length - 1) {
                const nextWrap = slideElements[currentSlideIndex + 1].cloneNode(true);
                nextWrap.className = 'slide-wrapper'; 
                nextBox.appendChild(nextWrap);
            } else {
                nextBox.innerHTML = '<div class="h-full flex items-center justify-center text-gray-700 uppercase tracking-widest text-xs font-bold bg-[#0a0c12]">End of Presentation</div>';
            }
            
            const rawNote = speakerNotes[currentSlideIndex] || 'No notes for this slide.';
            notesBox.innerText = rawNote;
            counterBox.innerText = `Slide ${currentSlideIndex + 1} / ${slideElements.length}`;
            
            [currentBox, nextBox].forEach(box => {
                const wrapper = box.querySelector('.slide-wrapper');
                if (wrapper) {
                    const scale = box.offsetWidth / 1000;
                    wrapper.style.width = '1000px';
                    wrapper.style.height = '562.5px';
                    wrapper.style.transform = `scale(${scale})`;
                }
            });
        }

        function nextSlide() {
            if (currentSlideIndex < slideElements.length - 1) { currentSlideIndex++; updatePresentation(); } 
            else exitPresent();
        }

        function prevSlide() {
            if (currentSlideIndex > 0) { currentSlideIndex--; updatePresentation(); }
        }

        function exitPresent() { overlay.classList.remove('active'); }
        function handleOverlayClick(e) { if (!e.target.closest('iframe') && !e.target.closest('button')) nextSlide(); }

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') present();
            if (overlay.classList.contains('active')) {
                if (['ArrowRight', ' ', 'Enter'].includes(e.key)) nextSlide();
                if (['ArrowLeft', 'Backspace'].includes(e.key)) prevSlide();
                if (e.key === 'Escape') exitPresent();
            }
        });

        setTheme(currentTheme);
        renderSlides();
    </script>
</body>
</html>
